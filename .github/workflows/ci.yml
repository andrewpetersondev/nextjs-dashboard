# Continuous Integration (CI)
#
# Single-branch, local-first model: feature work is merged into `main` locally
# (worktrees share one object store, so no remote round-trip) and pushed. There
# are no PRs — CI runs on every push to `main` as the safety net.
#
#   • check — fast, dependency-free checks (Biome lint + Markdown lint/format +
#     type-check + Next.js typegen) plus the migration-drift gate and the DB-free
#     unit lane with coverage thresholds (~1 min).
#   • e2e — the slow Cypress end-to-end suite against a real `next dev` server
#     backed by an ephemeral Postgres service container (recreates the
#     `.env.test.local` from non-secret CI values, so no GitHub secrets needed).
#
# Both run on every push to `main`. Because the merge happens locally before the
# push, a red run means fix-forward — run `pnpm check:fast` locally before merging
# to catch most failures pre-push.
#
# Still intentionally NOT here: the integration vitest lane and the production
# build. They also need a database/secrets; the e2e job's service-container
# pattern could bring the integration lane in later if wanted.

name: CI

# When should this workflow run?
on:
  push:
    branches: [main]

# If you push again before a run finishes, cancel the old run (saves CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only needs to read the repository.
permissions:
  contents: read

jobs:
  check:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository code onto the runner.
      - name: Checkout repository
        uses: actions/checkout@v7

      # 2. Install pnpm. The version is read automatically from the
      #    "packageManager" field in package.json, so it stays in sync.
      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      # 3. Install Node.js and cache the pnpm store so installs are faster.
      #    (pnpm must be set up BEFORE this step for the cache to work.)
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc" # single source of truth for the Node version
          cache: pnpm

      # 4. Install dependencies exactly as pinned in pnpm-lock.yaml.
      #    --frozen-lockfile fails the build if the lockfile is out of date.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Lint, formatting, and import-order checks (Biome).
      - name: Lint
        run: pnpm biome:lint

      # 6. Markdown lint (markdownlint-cli2) + format check (dprint).
      - name: Markdown
        run: pnpm md:check

      # 7. TypeScript type-checking.
      - name: Type-check
        run: pnpm typecheck

      # 8. Generate Next.js route types and type-check the app against them.
      - name: Next.js typegen
        run: pnpm next:typegen

      # 9. Migration drift gate: assert the dev/test/prod drizzle migration sets
      #    describe the same final schema. Pure file comparison (no database),
      #    so it runs in plain CI. Catches the per-env drift that broke prod on
      #    2026-06-11. See BACKLOG "Per-env migration drift guard".
      - name: Migration drift
        run: pnpm db:drift

      # 10. Unit tests + coverage. The unit lane is DB-free (dummy env + mocked
      #     DB), so it runs in plain CI. `test:coverage` also enforces the
      #     coverage floors in `vitest.config.ts` — a regression below them fails
      #     the build.
      - name: Unit tests + coverage
        run: pnpm test:coverage

  e2e:
    name: E2E (Cypress)
    # Runs on every push to `main` (the only trigger now). The local pre-push
    # `pnpm check:fast` covers lint/types/unit; this is the full e2e safety net.
    runs-on: ubuntu-latest
    # Generous ceiling: a cold `next dev` (Turbopack compiles routes on first
    # hit) plus 20 specs. The warm local run is ~35s; this is a safety net.
    timeout-minutes: 15

    # Ephemeral test database. POSTGRES_DB MUST be `test_db`: the `db-env-guard`
    # smoke spec asserts databaseName==="test_db", and the e2e preflight asserts
    # databaseEnv==="test" — both read from /api/health.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      # Cache the Cypress binary (~/.cache/Cypress). Restored BEFORE install so
      # the `cypress` postinstall finds it instead of re-downloading every run.
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The e2e harness (cypress-with-server.cli.ts) treats .env.test.local as
      # the single source of truth for PORT + the DB env. Recreate it from
      # non-secret CI values; SESSION_SECRET is generated per run (specs never
      # assert on it, only that it is present and valid).
      - name: Write .env.test.local
        run: |
          {
            echo "AUTH_BCRYPT_SALT_ROUNDS=12"
            echo "DATABASE_ENV=test"
            echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db"
            echo "NODE_ENV=test"
            echo "PORT=3000"
            echo "SESSION_SECRET=$(openssl rand -base64 48)"
            echo "NEXT_PUBLIC_LOG_LEVEL=info"
            echo "NEXT_PUBLIC_NODE_ENV=test"
          } > .env.test.local

      # Apply the committed TEST migrations (drizzle-kit migrate, scope=test):
      # the production-like path that also exercises the drift-guarded set.
      - name: Apply test migrations
        run: pnpm db:migrate:test

      # Seed the demo users/invoices the specs expect.
      - name: Seed test database
        run: pnpm db:seed:test

      # Boots `next dev` (test env) on PORT, waits for it, runs the /api/health
      # identity preflight, then the Cypress suite. start-server-and-test tears
      # the server down afterward and propagates the suite's exit code.
      - name: Run Cypress e2e
        run: pnpm cy:e2e
